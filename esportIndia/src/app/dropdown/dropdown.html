<div class="relative w-full">
  <button (click)="toggle()" type="button" class="w-full flex items-center justify-between bg-white/5 border border-purple-500/30 text-white text-sm rounded-xl p-3 outline-none hover:border-purple-500/60 hover:bg-white/10 transition-all shadow-sm">
    <span class="truncate">{{ selectedItem() || placeholder() }}</span>
    <svg class="w-4 h-4 text-purple-400 ml-3 flex-shrink-0 transition-transform" [class.rotate-180]="isOpen()" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
  </button>

  @if (isOpen()) {
    <div class="absolute z-50 w-full mt-2 bg-[#12121a] border border-purple-500/30 rounded-xl shadow-2xl shadow-purple-900/20 overflow-hidden backdrop-blur-md">
      <ul class="max-h-64 overflow-y-auto py-1 custom-scrollbar">
        <li>
          <button (click)="selectItem(null)" 
                  [class.bg-purple-500_20]="selectedItem() === null"
                  [class.text-purple-300]="selectedItem() === null"
                  [class.font-medium]="selectedItem() === null"
                  class="w-full text-left px-4 py-3 text-sm text-white/80 hover:bg-white/10 hover:text-white transition-colors">
            {{ placeholder() }}
          </button>
        </li>
        @for (item of (items() || []); track item) {
          <li>
            <button (click)="selectItem(item)" 
                    [class.bg-purple-500_20]="selectedItem() === item"
                    [class.text-purple-300]="selectedItem() === item"
                    [class.font-medium]="selectedItem() === item"
                    class="w-full text-left px-4 py-3 text-sm text-white/80 hover:bg-white/10 hover:text-white transition-colors truncate">
              {{ item }}
            </button>
          </li>
        }
      </ul>
    </div>
  }
</div>
